version: "3.9"

services:
  web:
    build: .
    container_name: dashboard-911-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: nine_eleven
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: dashboard-911-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_911_data:/data/db

volumes:
  mongo_911_data:
